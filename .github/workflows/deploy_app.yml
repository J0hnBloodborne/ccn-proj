name: Deploy App Space to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - 'backend/src/app/**'
      - 'backend/pyproject.toml'
      - 'backend/Dockerfile.app'
      - '.github/workflows/deploy_app.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_APP_REPO: ${{ secrets.HF_APP_REPO }}
        run: |
          cd backend/
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Initialize isolated repo for HF Deployment
          git init
          git add src/ pyproject.toml Dockerfile.app
          git commit -m "Deploy App to HF Spaces"
          
          # Rename Dockerfile.app to Dockerfile for Hugging Face standard detection
          mv Dockerfile.app Dockerfile
          git add Dockerfile
          git commit --amend -m "Deploy App to HF Spaces"
          
          git push -f https://user:$HF_TOKEN@huggingface.co/spaces/$HF_APP_REPO main
